<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">Doppler execution map</title>
  <desc id="desc">Doppler model, WebGPU, Metal, and Vulkan execution lanes.</desc>
  <defs>
    <linearGradient id="spectrum" x1="92" y1="92" x2="1308" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b7a"/>
      <stop offset="0.5" stop-color="#5d8dff"/>
      <stop offset="1" stop-color="#b98cff"/>
    </linearGradient>
    <linearGradient id="wash" x1="0" y1="0" x2="1400" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3f4"/>
      <stop offset="0.55" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f8f1ff"/>
    </linearGradient>
    <style>
      text { font-family: "Space Grotesk", "Azeret Mono", "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #08090c; }
      .title { font-size: 44px; font-weight: 900; letter-spacing: -1px; }
      .eyebrow { font-size: 13px; font-weight: 850; letter-spacing: 4px; fill: #3a3d46; }
      .node-title { font-size: 24px; font-weight: 850; }
      .node-text { font-size: 16px; font-weight: 650; fill: #30323a; }
      .mono { font-family: "Azeret Mono", "IBM Plex Mono", Menlo, Consolas, monospace; font-size: 14px; font-weight: 750; fill: #30323a; }
      .chip { font-size: 14px; font-weight: 850; letter-spacing: 3px; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1 L13 7 L1 13 Z" fill="#08090c"/>
    </marker>
  </defs>

  <rect width="1400" height="700" fill="#ffffff"/>
  <rect x="36" y="36" width="1328" height="628" rx="32" fill="url(#wash)" opacity="0.78"/>
  <rect x="36" y="36" width="1328" height="628" rx="32" fill="none" stroke="#08090c" stroke-width="2"/>

  <text x="86" y="104" class="eyebrow">DOPPLER</text>
  <text x="86" y="154" class="title">Execution map</text>
  <text x="86" y="190" class="node-text">Model data stays explicit; backend lanes stay visible.</text>

  <g transform="translate(86 254)">
    <rect x="0" y="0" width="330" height="248" rx="24" fill="#ffffff" stroke="#08090c" stroke-width="2"/>
    <text x="32" y="52" class="eyebrow">LOAD</text>
    <text x="32" y="91" class="node-title">Model graph</text>
    <text x="32" y="128" class="node-text">RDRR shards</text>
    <text x="32" y="158" class="node-text">typed weights</text>
    <text x="32" y="188" class="node-text">kernel policy</text>
    <rect x="32" y="204" width="128" height="28" rx="14" fill="#08090c"/>
    <text x="96" y="224" text-anchor="middle" class="mono" style="fill:#ffffff">manifest</text>
  </g>

  <g transform="translate(536 222)">
    <rect x="0" y="0" width="328" height="312" rx="28" fill="#08090c"/>
    <rect x="18" y="18" width="292" height="276" rx="22" fill="#ffffff"/>
    <path d="M70 198c54-112 134-112 188 0" fill="none" stroke="#08090c" stroke-width="16" stroke-linecap="round"/>
    <path d="M70 198c54-112 134-112 188 0" fill="none" stroke="url(#spectrum)" stroke-width="7" stroke-linecap="round"/>
    <text x="164" y="72" text-anchor="middle" class="eyebrow">CONTRACT</text>
    <text x="164" y="116" text-anchor="middle" class="node-title">WebGPU</text>
    <text x="164" y="148" text-anchor="middle" class="node-text">buffers + WGSL kernels</text>
    <circle cx="70" cy="198" r="14" fill="#ff6b7a" stroke="#08090c" stroke-width="2"/>
    <circle cx="164" cy="87" r="14" fill="#5d8dff" stroke="#08090c" stroke-width="2"/>
    <circle cx="258" cy="198" r="14" fill="#b98cff" stroke="#08090c" stroke-width="2"/>
  </g>

  <g transform="translate(984 254)">
    <rect x="0" y="0" width="330" height="248" rx="24" fill="#ffffff" stroke="#08090c" stroke-width="2"/>
    <text x="32" y="52" class="eyebrow">BACKENDS</text>
    <text x="32" y="91" class="node-title">Native lanes</text>
    <rect x="32" y="124" width="118" height="38" rx="19" fill="#08090c"/>
    <text x="91" y="149" text-anchor="middle" class="chip" style="fill:#ffffff">METAL</text>
    <rect x="166" y="124" width="132" height="38" rx="19" fill="#ffffff" stroke="#08090c" stroke-width="2"/>
    <text x="232" y="149" text-anchor="middle" class="chip">VULKAN</text>
    <text x="32" y="202" class="node-text">same graph boundary</text>
    <text x="32" y="228" class="node-text">separate hardware path</text>
  </g>

  <path d="M416 378H526" stroke="#08090c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M864 378H974" stroke="#08090c" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M394 214C500 120 900 120 1006 214" fill="none" stroke="url(#spectrum)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <text x="700" y="124" text-anchor="middle" class="mono">config in, receipts out</text>
</svg>
