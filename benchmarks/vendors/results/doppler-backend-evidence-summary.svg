      .mono { font-family: SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
      .title { font-size: 30px; font-weight: 850; }
      .sub { font-size: 14px; font-weight: 600; fill: #343a40; }
      .eyebrow { font-size: 12px; font-weight: 850; letter-spacing: .08em; }
      .head { font-size: 12px; font-weight: 850; letter-spacing: .04em; fill: #343a40; }
      .cell { font-size: 13px; font-weight: 650; }
      .small { font-size: 11px; font-weight: 650; fill: #343a40; }
      .path { font-size: 10.5px; font-weight: 650; fill: #343a40; }
      .status { font-size: 12px; font-weight: 850; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="620" fill="#fbfaf6" />
  <rect x="18" y="18" width="1244" height="584" rx="7" fill="#ffffff" stroke="#111111" stroke-width="1.35" />

