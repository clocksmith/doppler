name: Default Green Chain

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-green:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run default green chain
        run: npm run check:green
