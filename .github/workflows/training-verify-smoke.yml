name: Training Verify Smoke

on:
  pull_request:
    paths:
      - 'src/config/**'
      - 'src/tooling/**'
      - 'src/training/**'
      - 'tests/config/**'
      - 'tests/integration/**'
      - 'tools/run-node-tests.mjs'
      - '.github/workflows/training-verify-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'src/config/**'
      - 'src/tooling/**'
      - 'src/training/**'
      - 'tests/config/**'
      - 'tests/integration/**'
      - 'tools/run-node-tests.mjs'
      - '.github/workflows/training-verify-smoke.yml'
  workflow_dispatch:

jobs:
  training-verify-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run verify-path contract tests
        run: node tools/run-node-tests.mjs tests/integration/command-api.test.js tests/integration/command-runner-shared.test.js tests/integration/training-command-malformed-surface.test.js tests/integration/browser-harness-dispatch-map.test.js tests/integration/ul-command-threading-parity.test.js

      - name: Run UL/training schema tests
        run: node tools/run-node-tests.mjs tests/config/ul-training-schema.test.js tests/config/training-metrics-schema.test.js tests/config/training-telemetry-config-merge.test.js tests/config/ul-stage1-objective.test.js tests/config/ul-stage2-objective.test.js
