name: Kernel Tests

on:
  pull_request:
    paths:
      - 'src/gpu/**'
      - 'src/inference/**'
      - 'src/loader/**'
      - 'src/storage/**'
      - 'tests/inference/**'
      - 'tests/kernels/**'
      - 'tests/converter/**'
      - 'tests/config/**'
      - 'tests/integration/**'
      - 'tools/run-node-tests.js'
      - 'tools/run-node-test-file.js'
      - 'tools/run-node-coverage.js'
      - 'tools/node-test-runtime-setup.js'
      - 'src/cli/doppler-cli.js'
      - 'src/tooling/**'
      - 'src/config/supported-operations.js'
      - 'src/config/supported-operations.json'
      - 'src/config/supported-operations.d.ts'
      - 'src/config/execution-contract-check.js'
      - 'package.json'
      - '.github/workflows/kernel-tests.yml'
  push:
    branches: [main]
    paths:
      - 'src/gpu/**'
      - 'src/inference/**'
      - 'src/loader/**'
      - 'src/storage/**'
      - 'tests/inference/**'
      - 'tests/kernels/**'
      - 'tests/converter/**'
      - 'tests/config/**'
      - 'tests/integration/**'
      - 'tools/run-node-tests.js'
      - 'tools/run-node-test-file.js'
      - 'tools/run-node-coverage.js'
      - 'tools/node-test-runtime-setup.js'
      - 'src/cli/doppler-cli.js'
      - 'src/tooling/**'
      - 'src/config/supported-operations.js'
      - 'src/config/supported-operations.json'
      - 'src/config/supported-operations.d.ts'
      - 'src/config/execution-contract-check.js'
      - 'package.json'
      - '.github/workflows/kernel-tests.yml'
  workflow_dispatch:

jobs:
  kernel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Keep unit tests first so contract failures stop the lane before GPU/browser-only stages.
      - name: Run unit tests
        run: npm run test:unit

      - name: Run kernel-suite tests
        run: npm run test:gpu

      - name: Run node coverage gate
        run: npm run test:coverage

      - name: Run browser kernel-suite smoke
        run: npm run test:gpu:browser
