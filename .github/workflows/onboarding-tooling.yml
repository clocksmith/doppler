name: Onboarding Consistency Checks

on:
  pull_request:
    paths:
      - 'src/config/**'
      - 'benchmarks/vendors/**'
      - 'skills/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.claude/skills'
      - '.gemini/skills'
      - 'docs/architecture.md'
      - 'docs/rdrr-format.md'
      - 'docs/config.md'
      - 'docs/style/general-style-guide.md'
      - 'docs/style/javascript-style-guide.md'
      - 'docs/style/command-interface-design-guide.md'
      - 'src/inference/pipelines/text.js'
      - 'src/tooling/command-api.js'
      - 'src/tooling/browser-command-runner.js'
      - 'src/tooling/node-command-runner.js'
      - 'src/client/doppler-registry.js'
      - 'src/client/doppler-registry.json'
      - 'src/cli/doppler-cli.js'
      - 'tools/sync-quickstart-registry.js'
      - 'tools/policies/agent-parity-policy.json'
      - 'tools/verify-agent-parity.js'
      - 'tools/verify-agent-freshness.js'
      - 'tools/run-registry-verify.js'
      - 'tools/sync-registry-scripts.js'
      - 'tools/sync-model-support-matrix.js'
      - 'benchmarks/vendors/benchmark-policy.json'
      - 'tools/onboarding-tooling.js'
      - 'src/config/conversion/**'
      - 'models/catalog.json'
      - 'docs/model-support-matrix.md'
      - 'package.json'
      - '.github/workflows/onboarding-tooling.yml'
      - 'docs/onboarding-tooling.md'
  push:
    branches: [main]
    paths:
      - 'src/config/**'
      - 'benchmarks/vendors/**'
      - 'skills/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.claude/skills'
      - '.gemini/skills'
      - 'docs/architecture.md'
      - 'docs/rdrr-format.md'
      - 'docs/config.md'
      - 'docs/style/general-style-guide.md'
      - 'docs/style/javascript-style-guide.md'
      - 'docs/style/command-interface-design-guide.md'
      - 'src/inference/pipelines/text.js'
      - 'src/tooling/command-api.js'
      - 'src/tooling/browser-command-runner.js'
      - 'src/tooling/node-command-runner.js'
      - 'src/client/doppler-registry.js'
      - 'src/client/doppler-registry.json'
      - 'src/cli/doppler-cli.js'
      - 'tools/sync-quickstart-registry.js'
      - 'tools/policies/agent-parity-policy.json'
      - 'tools/verify-agent-parity.js'
      - 'tools/verify-agent-freshness.js'
      - 'tools/run-registry-verify.js'
      - 'tools/sync-registry-scripts.js'
      - 'tools/sync-model-support-matrix.js'
      - 'benchmarks/vendors/benchmark-policy.json'
      - 'tools/onboarding-tooling.js'
      - 'src/config/conversion/**'
      - 'models/catalog.json'
      - 'docs/model-support-matrix.md'
      - 'package.json'
      - '.github/workflows/onboarding-tooling.yml'
      - 'docs/onboarding-tooling.md'
  workflow_dispatch:

jobs:
  onboarding:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HF registry script sync check
        run: npm run registry:sync:scripts:check

      - name: Run model support matrix check
        run: npm run support:matrix:check

      - name: Run quickstart registry sync check
        run: npm run quickstart:check

      - name: Run strict onboarding validator
        run: npm run onboarding:check:strict

      - name: Run strict AGENTS freshness check
        run: npm run agents:freshness:strict

      - name: Run vendor benchmark registry validation
        run: npm run bench:vendors:validate
