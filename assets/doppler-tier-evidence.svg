<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Metal and Vulkan browser WebGPU throughput</title>
  <desc id="desc">Measured Doppler and Transformers.js throughput across tracked Apple M3 Metal and Radeon 8060S Vulkan workloads.</desc>
  <defs>
    <style>
      text { fill: #111111; font-family: Inter, "Segoe UI", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 12px; font-weight: 800; fill: #6d28d9; }
      .title { font-size: 32px; font-weight: 800; }
      .subtitle { font-size: 14px; font-weight: 600; fill: #495057; }
      .section { font-size: 16px; font-weight: 800; }
      .section-detail { font-size: 11.5px; font-weight: 700; fill: #495057; }
      .model { font-size: 15px; font-weight: 800; }
      .detail { font-size: 10.5px; font-weight: 650; fill: #495057; }
      .bar-value { font-size: 12px; font-weight: 800; fill: #ffffff; }
      .ratio { font-size: 21px; font-weight: 800; fill: #6d28d9; }
      .badge { font-size: 11px; font-weight: 800; }
      .legend { font-size: 11.5px; font-weight: 700; fill: #495057; }
      .footer { font-size: 10.5px; font-weight: 650; fill: #495057; }
      .tjs-value { fill: #3a2600; }
    </style>
  </defs>

  <rect width="1280" height="860" fill="#ffffff" />
  <rect x="18" y="18" width="1244" height="824" rx="6" fill="#ffffff" stroke="#111111" stroke-width="1.4" />

  <text x="42" y="54" class="eyebrow">DOPPLER / TRANSFORMERS.JS</text>
  <text x="42" y="90" class="title">Metal + Vulkan throughput</text>
  <text x="42" y="118" class="subtitle">Browser WebGPU · Apple M3 Metal · Radeon 8060S Vulkan · pinned comparators</text>

  <rect x="936" y="40" width="132" height="58" rx="4" fill="#f8fafc" stroke="#d9dee5" stroke-width="1.3" />
  <text x="1002" y="65" text-anchor="middle" class="badge">TIER 1</text>
  <text x="1002" y="86" text-anchor="middle" class="badge">6 / 6</text>
  <rect x="1080" y="40" width="140" height="58" rx="4" fill="#f8fafc" stroke="#d9dee5" stroke-width="1.3" />
  <text x="1150" y="65" text-anchor="middle" class="badge">TIER 2</text>
  <text x="1150" y="86" text-anchor="middle" class="badge">2 / 2</text>

  <rect x="42" y="139" width="14" height="14" rx="2" fill="#6d28d9" />
  <text x="65" y="151" class="legend">Doppler</text>
  <rect x="142" y="139" width="14" height="14" rx="2" fill="#ffb000" />
  <text x="165" y="151" class="legend">Transformers.js</text>
  <text x="1198" y="151" text-anchor="end" class="legend">HIGHER IS BETTER · EACH ROW HAS ITS OWN SCALE</text>
  <line x1="42" y1="166" x2="1238" y2="166" stroke="#111111" stroke-width="1" />

  <text x="42" y="192" class="section">Apple M3 / Metal</text>
  <text x="1188" y="192" text-anchor="end" class="section-detail">TIER 1 · RELEASE-CLAIMABLE · 3 / 3</text>

  <rect x="42" y="205" width="1196" height="58" rx="4" fill="#f3fbf8" stroke="#b7ded1" />
  <rect x="42" y="215" width="4" height="38" fill="#6b7280" />
  <text x="62" y="229" class="model">Qwen 3.5 0.8B text</text>
  <text x="62" y="249" class="detail">p512 / d128 · exact output</text>
  <rect x="390" y="215" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="215" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="227" class="bar-value mono">38.42 tok/s</text>
