  <rect x="390" y="450" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="462" class="bar-value mono">69.07 tok/s</text>
  <rect x="390" y="473" width="560" height="16" rx="2" fill="#fff4cc" />
  <rect x="390" y="473" width="339" height="16" rx="2" fill="#ffb000" />
  <text x="400" y="485" class="bar-value tjs-value mono">41.79 tok/s</text>
  <line x1="980" y1="450" x2="980" y2="488" stroke="#b7ded1" />
  <text x="1109" y="472" text-anchor="middle" class="ratio">1.65x</text>

  <rect x="42" y="505" width="1196" height="58" rx="4" fill="#f6f7ff" stroke="#d8ddf0" />
  <rect x="42" y="515" width="4" height="38" fill="#6b7280" />
  <text x="62" y="529" class="model">T1 · Qwen 3 Embedding 0.6B</text>
  <text x="62" y="549" class="detail">15 runs · semantic pass</text>
  <rect x="390" y="515" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="515" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="527" class="bar-value mono">33.88 emb/s</text>
  <rect x="390" y="538" width="560" height="16" rx="2" fill="#fff4cc" />
  <rect x="390" y="538" width="111" height="16" rx="2" fill="#ffb000" />
  <text x="400" y="550" class="bar-value tjs-value mono">6.69 emb/s</text>
  <line x1="980" y1="515" x2="980" y2="553" stroke="#d8ddf0" />
  <text x="1109" y="537" text-anchor="middle" class="ratio">5.06x</text>

  <rect x="42" y="570" width="1196" height="58" rx="4" fill="#fff9f3" stroke="#ead8bf" />
  <rect x="42" y="580" width="4" height="38" fill="#6b7280" />
  <text x="62" y="594" class="model">T1 · Qwen 3 Reranker 0.6B</text>
  <text x="62" y="614" class="detail">15 runs · semantic pass</text>
  <rect x="390" y="580" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="580" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="592" class="bar-value mono">3.59 reranks/s</text>
  <rect x="390" y="603" width="560" height="16" rx="2" fill="#fff4cc" />
  <rect x="390" y="603" width="331" height="16" rx="2" fill="#ffb000" />
  <text x="400" y="615" class="bar-value tjs-value mono">2.12 reranks/s</text>
  <line x1="980" y1="580" x2="980" y2="618" stroke="#ead8bf" />
  <text x="1109" y="602" text-anchor="middle" class="ratio">1.69x</text>

  <rect x="42" y="635" width="1196" height="58" rx="4" fill="#f8fafc" stroke="#d9dee5" />
  <rect x="42" y="645" width="4" height="38" fill="#6b7280" />
  <text x="62" y="659" class="model">T2 · Qwen 3.5 2B text</text>
  <text x="62" y="679" class="detail">p512 / d128 · exact output · local</text>
  <rect x="390" y="645" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="645" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="657" class="bar-value mono">56.50 tok/s</text>
  <rect x="390" y="668" width="560" height="16" rx="2" fill="#fff4cc" />
  <rect x="390" y="668" width="411" height="16" rx="2" fill="#ffb000" />
  <text x="400" y="680" class="bar-value tjs-value mono">41.50 tok/s</text>
  <line x1="980" y1="645" x2="980" y2="683" stroke="#d9dee5" />
  <text x="1109" y="667" text-anchor="middle" class="ratio">1.36x</text>

  <rect x="42" y="700" width="1196" height="58" rx="4" fill="#fff5e8" stroke="#ead8bf" />
  <rect x="42" y="710" width="4" height="38" fill="#6b7280" />
  <text x="62" y="724" class="model">T2 · Gemma 4 E2B INT4-PLE</text>
  <text x="62" y="744" class="detail">p064 / d064 · product-format policy · local</text>
  <rect x="390" y="710" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="710" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="722" class="bar-value mono">16.32 tok/s</text>
  <rect x="390" y="733" width="560" height="16" rx="2" fill="#fff4cc" />
  <rect x="390" y="733" width="317" height="16" rx="2" fill="#ffb000" />
  <text x="400" y="745" class="bar-value tjs-value mono">9.24 tok/s</text>
  <line x1="980" y1="710" x2="980" y2="748" stroke="#ead8bf" />
  <text x="1109" y="732" text-anchor="middle" class="ratio">1.77x</text>

  <line x1="42" y1="780" x2="1238" y2="780" stroke="#111111" stroke-width="1" />
  <text x="42" y="806" class="footer">Tier 1 rows are release-claimable. Vulkan Tier 2 rows are local-comparable; Gemma uses its product-format parity policy.</text>
  <text x="42" y="828" class="footer">TJS loads the Vulkan embedding and reranker models faster. Backend lanes and bar scales remain separate.</text>
  <text x="1238" y="828" text-anchor="end" class="footer mono">8 RECEIPTS LINKED BELOW</text>
</svg>
