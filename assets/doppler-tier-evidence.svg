  <line x1="980" y1="280" x2="980" y2="318" stroke="#d8ddf0" />
  <text x="1109" y="302" text-anchor="middle" class="ratio">1.18x</text>

  <rect x="42" y="335" width="1196" height="58" rx="4" fill="#fff9f3" stroke="#ead8bf" />
  <rect x="42" y="345" width="4" height="38" fill="#6b7280" />
  <text x="62" y="359" class="model">Qwen 3 Reranker 0.6B</text>
  <text x="62" y="379" class="detail">semantic pass · expected top document</text>
  <rect x="390" y="345" width="560" height="16" rx="2" fill="#ede9fe" />
  <rect x="390" y="345" width="560" height="16" rx="2" fill="#6d28d9" />
  <text x="400" y="357" class="bar-value mono">2.14 reranks/s</text>
