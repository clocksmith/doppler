  <text x="1109" y="367" text-anchor="middle" class="ratio">1.05x</text>

  <line x1="42" y1="411" x2="1238" y2="411" stroke="#111111" stroke-width="1" />
  <text x="42" y="432" class="section">Radeon 8060S / Vulkan</text>
  <text x="1188" y="432" text-anchor="end" class="section-detail">TIER 1 RELEASE-CLAIMABLE · TIER 2 LOCAL-COMPARABLE · 5 / 5</text>

  <rect x="42" y="440" width="1196" height="58" rx="4" fill="#f3fbf8" stroke="#b7ded1" />
  <rect x="42" y="450" width="4" height="38" fill="#6b7280" />
  <text x="62" y="464" class="model">T1 · Qwen 3.5 0.8B text</text>
  <text x="62" y="484" class="detail">p512 / d128 · exact output</text>
