<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Doppler WebGPU inference runtime</title>
  <desc id="desc">A product hero for Doppler showing browser, manifest, WebGPU kernels, and receipt-backed evidence lanes.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="40" y1="20" x2="1160" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.36" stop-color="#edf7ff"/>
      <stop offset="0.72" stop-color="#f1fff6"/>
      <stop offset="1" stop-color="#fff0f4"/>
    </linearGradient>
    <linearGradient id="lane-a" x1="0" y1="0" x2="310" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b7a"/>
      <stop offset="0.48" stop-color="#00a88f"/>
      <stop offset="1" stop-color="#4f7cff"/>
    </linearGradient>
    <linearGradient id="lane-b" x1="0" y1="0" x2="190" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111318"/>
      <stop offset="1" stop-color="#353946"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111318" flood-opacity="0.14"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111318; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "Liberation Mono", Menlo, monospace; }
      .title { font-size: 72px; font-weight: 900; letter-spacing: 2px; }
      .subtitle { font-size: 25px; font-weight: 700; fill: #3b414c; }
      .small { font-size: 17px; font-weight: 800; letter-spacing: 1px; }
      .tiny { font-size: 14px; font-weight: 800; fill: #4c5360; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="42" fill="#ffffff"/>
  <rect x="18" y="18" width="1164" height="324" rx="34" fill="url(#hero-bg)"/>
  <rect x="18" y="18" width="1164" height="324" rx="34" fill="none" stroke="#111318" stroke-width="2"/>

  <g transform="translate(72 68)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="228" height="228" rx="52" fill="#111318"/>
    <path d="M66 65h48c61 0 99 37 99 86s-38 86-99 86H66z" transform="translate(-27 -18)" fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M102 58c46 0 76 31 76 70s-30 70-76 70" fill="none" stroke="url(#lane-a)" stroke-width="17" stroke-linecap="round"/>
    <path d="M32 158h48M32 180h76" stroke="#ffffff" stroke-opacity="0.92" stroke-width="10" stroke-linecap="round"/>
    <circle cx="180" cy="58" r="11" fill="#ff6b7a"/>
    <circle cx="188" cy="198" r="11" fill="#4f7cff"/>
  </g>

  <g transform="translate(350 78)">
    <text x="0" y="58" class="title">Doppler</text>
    <text x="4" y="101" class="subtitle">Browser-native WebGPU inference with explicit runtime contracts.</text>

    <g transform="translate(4 137)">
      <rect x="0" y="0" width="188" height="42" rx="21" fill="#111318"/>
      <text x="94" y="28" text-anchor="middle" class="small white">RDRR manifests</text>
      <rect x="204" y="0" width="136" height="42" rx="21" fill="#ffffff" stroke="#111318" stroke-width="2"/>
      <text x="272" y="28" text-anchor="middle" class="small">JS orchestration</text>
      <rect x="356" y="0" width="134" height="42" rx="21" fill="#ffffff" stroke="#111318" stroke-width="2"/>
      <text x="423" y="28" text-anchor="middle" class="small">WGSL kernels</text>
      <rect x="506" y="0" width="152" height="42" rx="21" fill="#ffffff" stroke="#111318" stroke-width="2"/>
      <text x="582" y="28" text-anchor="middle" class="small">evidence gates</text>
    </g>

    <g transform="translate(8 218)">
      <path d="M0 0h310" stroke="url(#lane-a)" stroke-width="9" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="12" fill="#ff6b7a" stroke="#111318" stroke-width="2"/>
      <circle cx="104" cy="0" r="12" fill="#f5b942" stroke="#111318" stroke-width="2"/>
      <circle cx="208" cy="0" r="12" fill="#00a88f" stroke="#111318" stroke-width="2"/>
      <circle cx="310" cy="0" r="12" fill="#4f7cff" stroke="#111318" stroke-width="2"/>
      <text x="0" y="36" text-anchor="middle" class="tiny">model</text>
      <text x="104" y="36" text-anchor="middle" class="tiny">cache</text>
      <text x="208" y="36" text-anchor="middle" class="tiny">decode</text>
      <text x="310" y="36" text-anchor="middle" class="tiny">receipt</text>
    </g>
  </g>

  <g transform="translate(922 88)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="190" height="180" rx="34" fill="url(#lane-b)"/>
    <path d="M40 126c33-74 77-88 114-18" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M40 126c33-74 77-88 114-18" fill="none" stroke="url(#lane-a)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="126" r="13" fill="#ff6b7a" stroke="#ffffff" stroke-width="2"/>
    <circle cx="93" cy="49" r="13" fill="#f5b942" stroke="#ffffff" stroke-width="2"/>
    <circle cx="154" cy="108" r="13" fill="#4f7cff" stroke="#ffffff" stroke-width="2"/>
    <text x="95" y="153" text-anchor="middle" class="small white">Metal / Vulkan</text>
  </g>
</svg>
