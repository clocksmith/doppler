<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Doppler is a browser-native desktop-style workspace for local AI inference, tracing, and kernel x-ray workflows.">
  <title>Doppler</title>
  <link rel="icon" type="image/svg+xml" href="/demo/favicon.svg">
  <link rel="apple-touch-icon" href="/demo/assets/pwa/icon-192.png">
  <link rel="manifest" href="/demo/pwa-manifest.json">
  <style>
    /* Critical boot styles are inline so the first HTML response animates even
       if the service worker serves a stale app.css during update turnover. */
    .boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg, #ffffff);
      color: var(--fg, #111111);
      display: grid;
      place-items: center;
      align-content: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 240ms ease;
    }

    .boot-overlay[hidden] {
      display: none !important;
    }

    .boot-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      width: max-content;
    }

    .boot-d4-loading {
      position: relative;
      display: inline-flex;
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      line-height: 1;
      isolation: isolate;
      perspective: 1200px;
    }

    .boot-d4-a,
    .boot-d4-b,
    .boot-d4-c,
    .boot-d4-d {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      text-align: center;
      color: inherit;
      font-size: 38px;
      line-height: 1;
      font-weight: 500;
      will-change: transform, opacity;
      transform-origin: center center;
      opacity: 1;
    }

    .boot-d4-a { animation: doppler-d4-overlay-a 4.444s ease-in-out infinite; }
    .boot-d4-b { animation: doppler-d4-overlay-b 4.444s ease-in-out infinite; }
    .boot-d4-c { animation: doppler-d4-overlay-c 4.444s ease-in-out infinite; }
    .boot-d4-d { animation: doppler-d4-overlay-d 4.444s ease-in-out infinite; }

    .boot-status {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.72;
      padding-top: 2px;
    }

    .boot-error {
      max-width: 480px;
      padding: 16px;
      border: 3px double currentColor;
      font-size: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes doppler-d4-overlay-a {
      0%, 3% { transform: scale(1) translate(0px, 0px); opacity: 1; }
      22%, 28% { transform: scale(0.45) translate(-31px, -18px); opacity: 0.5; }
      47%, 53% { transform: scale(0.45) translate(31px, -18px); opacity: 0.5; }
      72%, 78% { transform: scale(0.45) translate(0px, 35px); opacity: 0.5; }
      97%, 100% { transform: scale(1) translate(0px, 0px); opacity: 1; }
    }

    @keyframes doppler-d4-overlay-b {
      0%, 3% { transform: scale(0.45) translate(-31px, -18px); opacity: 0.5; }
      22%, 28% { transform: scale(0.45) translate(31px, -18px); opacity: 0.5; }
      47%, 53% { transform: scale(0.45) translate(0px, 35px); opacity: 0.5; }
      72%, 78% { transform: scale(1) translate(0px, 0px); opacity: 1; }
      97%, 100% { transform: scale(0.45) translate(-31px, -18px); opacity: 0.5; }
    }

    @keyframes doppler-d4-overlay-c {
      0%, 3% { transform: scale(0.45) translate(31px, -18px); opacity: 0.5; }
      22%, 28% { transform: scale(0.45) translate(0px, 35px); opacity: 0.5; }
      47%, 53% { transform: scale(1) translate(0px, 0px); opacity: 1; }
      72%, 78% { transform: scale(0.45) translate(-31px, -18px); opacity: 0.5; }
      97%, 100% { transform: scale(0.45) translate(31px, -18px); opacity: 0.5; }
    }

    @keyframes doppler-d4-overlay-d {
      0%, 3% { transform: scale(0.45) translate(0px, 35px); opacity: 0.5; }
      22%, 28% { transform: scale(1) translate(0px, 0px); opacity: 1; }
      47%, 53% { transform: scale(0.45) translate(-31px, -18px); opacity: 0.5; }
      72%, 78% { transform: scale(0.45) translate(31px, -18px); opacity: 0.5; }
      97%, 100% { transform: scale(0.45) translate(0px, 35px); opacity: 0.5; }
    }
  </style>
  <link rel="stylesheet" href="/demo/styles/rd.css">
  <link rel="stylesheet" href="/demo/ui/styles/app.css">
  <link rel="stylesheet" href="/demo/ui/token-press/styles.css">
  <link rel="stylesheet" href="/demo/ui/xray/styles.css">
  <script type="importmap">
    {
      "imports": {
        "doppler-gpu": "/src/index-browser.js"
      }
    }
  </script>
</head>

<body>
  <div id="desktop-titlebar" class="desktop-titlebar" hidden>
    <div class="desktop-titlebar-brand">Doppler</div>
    <div id="desktop-titlebar-phase" class="desktop-titlebar-phase">Ready</div>
  </div>

  <!-- Boot overlay -->
  <div id="boot-overlay" class="boot-overlay">
    <div class="boot-panel">
      <span id="boot-d4" class="boot-d4-loading" aria-hidden="true">
        <span class="boot-d4-a">D</span>
        <span class="boot-d4-b">4</span>
        <span class="boot-d4-c">D</span>
        <span class="boot-d4-d">A</span>
      </span>
      <div id="boot-status" class="boot-status">Checking WebGPU...</div>
    </div>
    <div id="boot-error" class="boot-error" hidden></div>
  </div>

  <!-- App shell -->
  <div id="app" class="app-shell" hidden>
    <!-- Header -->
    <header class="app-header">
      <h1 class="type-h2">Doppler</h1>
      <div class="app-header-end">
        <button id="install-btn" class="btn btn-ghost" hidden>Install</button>
        <div id="status" class="status-chip">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </header>

    <!-- Model picker -->
    <section id="model-picker" class="model-picker">
      <div class="type-label">Model</div>
      <div id="model-cards" class="model-cards"></div>
    </section>

    <!-- Input -->
    <section id="input-area" class="input-area">
      <div class="input-row">
        <textarea id="prompt-input" placeholder="Ask anything..." rows="3"></textarea>
        <div class="input-actions">
          <button id="shuffle-btn" class="btn btn-ghost" title="Random example">&#x21BB;</button>
          <button id="run-btn" class="btn btn-primary" disabled>Run</button>
          <button id="stop-btn" class="btn" hidden>Stop</button>
        </div>
      </div>
      <div id="image-drop" class="image-drop-zone">Drop image here</div>
    </section>

    <!-- Output -->
    <section id="output-area" class="output-area">
      <div class="output-header">
        <span id="output-phase" class="output-phase"></span>
        <span id="output-toks" class="output-toks"></span>
      </div>
      <div id="output-prefill-bar" class="output-prefill-bar" style="width: 0%"></div>
      <div id="output-text" class="output-text"></div>
      <!-- Token press container (optional) -->
      <div id="token-press-output" hidden></div>
      <div id="token-press-controls" hidden></div>
    </section>

    <!-- Settings -->
    <section class="settings-area">
      <button id="settings-toggle" class="btn btn-ghost">Settings</button>
      <div id="settings-panel" class="settings-panel">
        <!-- Profile — loads a full runtime config, populates fields below -->
        <div class="setting-field">
          <label for="set-profile" title="Runtime profile. Loads batching, KV cache, debug, and tracing defaults. Fields below override the profile.">Profile</label>
          <select id="set-profile">
            <option value="profiles/default">default</option>
            <option value="profiles/throughput">throughput</option>
            <option value="profiles/verbose-trace">verbose-trace</option>
            <option value="profiles/production">production</option>
            <option value="profiles/low-memory">low-memory</option>
            <option value="profiles/trace-layers">trace-layers</option>
          </select>
        </div>

        <!-- All fields are runtime config. Profile sets them; you override here. -->
        <div class="settings-grid">
          <div class="setting-field">
            <label for="set-temperature" title="inference.sampling.temperature — 0 = greedy. Higher = more random.">Temperature</label>
            <input id="set-temperature" type="number" min="0" max="2" step="0.1" value="1.0">
          </div>
          <div class="setting-field">
            <label for="set-top-k" title="inference.sampling.topK — 0 = disabled. Limits to K most probable tokens.">Top K</label>
            <input id="set-top-k" type="number" min="0" step="1" value="50">
          </div>
          <div class="setting-field">
            <label for="set-top-p" title="inference.sampling.topP — 1.0 = disabled. Nucleus sampling threshold.">Top P</label>
            <input id="set-top-p" type="number" min="0" max="1" step="0.05" value="0.95">
          </div>
          <div class="setting-field">
            <label for="set-max-tokens" title="inference.generation.maxTokens — Stop after N tokens. Also stops on EOS.">Max Tokens</label>
            <input id="set-max-tokens" type="number" min="1" step="1" value="256">
          </div>
          <div class="setting-field">
            <label for="set-batch-max-tokens" title="inference.batching.maxTokens — Tokens per GPU dispatch. Higher = throughput, more VRAM.">Batch Size</label>
            <input id="set-batch-max-tokens" type="number" min="1" step="1" value="64">
          </div>
          <div class="setting-field">
            <label for="set-readback" title="inference.batching.readbackInterval — Steps between GPU readbacks. 0 = end-only.">Readback</label>
            <input id="set-readback" type="number" min="0" step="1" value="0" placeholder="0 = end only">
          </div>
          <div class="setting-field">
            <label for="set-kv-dtype" title="inference.kvcache.kvDtype — f16 halves memory. f32 is full precision.">KV Dtype</label>
            <select id="set-kv-dtype">
              <option value="">profile default</option>
              <option value="f16">f16</option>
              <option value="f32">f32</option>
            </select>
          </div>
          <div class="setting-field">
            <label for="set-kv-max-seq" title="inference.kvcache.maxSeqLen — Pre-allocated cache length. 0 = model default.">KV Max Seq</label>
            <input id="set-kv-max-seq" type="number" min="0" step="256" value="0">
          </div>
          <div class="setting-field">
            <label for="set-log-level" title="shared.debug.logLevel.defaultLogLevel — Console verbosity.">Log Level</label>
            <select id="set-log-level">
              <option value="silent">silent</option>
              <option value="error">error</option>
              <option value="info" selected>info</option>
              <option value="verbose">verbose</option>
            </select>
          </div>
        </div>
        <div class="settings-checkboxes">
          <label class="checkbox-label checkbox-label--inline" title="Capture per-kernel and per-layer timing. Required for X-Ray decode/kernel panels. Adds overhead.">
            <input id="set-trace" type="checkbox"> Trace
          </label>
          <label class="checkbox-label checkbox-label--inline" title="Step-by-step token visualization with top-K candidates and confidence underline.">
            <input id="set-token-press" type="checkbox"> Token Press
          </label>
          <label class="checkbox-label checkbox-label--inline" title="Show tokens-per-second during decode. Needs Readback > 0 for real-time updates.">
            <input id="set-live-toks" type="checkbox" checked> Live tok/s
          </label>
        </div>
      </div>
    </section>

    <!-- Xray -->
    <section class="xray-area">
      <div class="xray-toggle-row">
        <span class="type-label" title="Debug visualization panels for inference internals.">X-Ray</span>
        <div class="xray-toggle-list">
          <label class="checkbox-label checkbox-label--inline" title="Decode waterfall: per-step timing breakdown."><input id="xray-toggle-decode" type="checkbox"> Decode</label>
          <label class="checkbox-label checkbox-label--inline" title="KV cache occupancy, layout, and eviction stats."><input id="xray-toggle-kv" type="checkbox"> KV Cache</label>
          <label class="checkbox-label checkbox-label--inline" title="Per-kernel dispatch timing and workgroup counts."><input id="xray-toggle-kernel" type="checkbox"> Kernel</label>
          <label class="checkbox-label checkbox-label--inline" title="GPU pipeline state, submit latency, and device info."><input id="xray-toggle-gpu" type="checkbox"> GPU</label>
          <label class="checkbox-label checkbox-label--inline" title="Execution plan: resolved op graph and step order."><input id="xray-toggle-exec" type="checkbox"> Exec</label>
          <label class="checkbox-label checkbox-label--inline" title="Memory breakdown: buffer pool, heap, and tensor sizes."><input id="xray-toggle-mem" type="checkbox"> Memory</label>
          <label class="checkbox-label checkbox-label--inline" title="Batching stats: batch sizes, guard reasons, and throughput."><input id="xray-toggle-batch" type="checkbox"> Batch</label>
        </div>
      </div>
      <div id="runtime-notice" class="runtime-notice" hidden></div>
    </section>
    <div id="xray-container" hidden></div>

    <!-- Report -->
    <div class="report-bar">
      <button id="export-btn" class="btn btn-ghost" disabled>Export JSON</button>
    </div>

    <section id="translate-compare-shell" hidden>
      <div id="translate-compare-layout"></div>
      <button id="translate-compare-run-btn" type="button">Run Compare</button>
      <button id="translate-compare-export-btn" type="button">Export Compare</button>
      <button id="translate-compare-export-latest-btn" type="button">Export Latest Compare</button>
      <div id="translate-history-list"></div>
      <div id="translate-left-engine"></div>
      <div id="translate-right-engine"></div>
      <div id="translate-compare-receipts"></div>
      <div id="translate-smoke-panel"></div>
      <div id="translate-smoke-grid"></div>
      <button data-compare-history-filter="all" type="button">All</button>
      <button data-compare-history-filter="same-model" type="button">Same Model</button>
      <button data-compare-history-filter="same-engine" type="button">Same Engine</button>
      <button data-compare-history-filter="proof" type="button">Proof</button>
    </section>
  </div>

  <dialog id="remove-model-dialog" class="confirm-dialog">
    <form method="dialog" class="confirm-dialog-panel">
      <div class="type-label">Remove model</div>
      <p id="remove-model-message" class="confirm-dialog-message"></p>
      <p id="remove-model-detail" class="confirm-dialog-detail"></p>
      <div class="confirm-dialog-actions">
        <button type="submit" value="cancel" class="btn btn-ghost">Cancel</button>
        <button id="remove-model-confirm-btn" type="submit" value="confirm" class="btn">Remove</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/demo/demo.js"></script>
</body>

</html>
